name: Auto Assign
on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - name: 'Auto-assign issue'
      uses: pozil/auto-assign-issue@07fe6dc0e9771842b428f5739098d6140734e226 # v4
      with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          assignees: "pboling"
          abortIfPreviousAssignees: true
          allowSelfAssign: true
          numOfAssignee: 1
